# docker-compose.yml (Project Root)
services:
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:3001
    ports:
      - "9000:80"
    depends_on:
      api:
        condition: service_healthy

  api:
    build: ./Backend # Tells Docker to look in the backend folder for the Dockerfile
    ports:
      - "4000:3000"
    env_file:
      - .env # Loads your backend variables
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/auth/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: ["node", "dist/src/server.js"]

  redis:
    image: redis:alpine
    ports:
      - "6380:6379"
