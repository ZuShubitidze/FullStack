# docker-compose.yml (Project Root)
services:
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:3000
    ports:
      - "5173:80" # Access UI at localhost:5173
    depends_on:
      api:
        condition: service_healthy

  api:
    build: ./Backend # Tells Docker to look in the backend folder for the Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env # Loads your backend variables
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/auth/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
